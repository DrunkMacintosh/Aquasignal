name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: write # test-summary comment on PRs

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt pytest
      - name: Run pytest
        id: pytest
        working-directory: backend
        run: |
          set -o pipefail
          pytest tests -q 2>&1 | tee pytest.log
          echo "## Backend tests" >> "$GITHUB_STEP_SUMMARY"
          tail -n 5 pytest.log >> "$GITHUB_STEP_SUMMARY"
      - name: Comment results on the PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const tail = fs.readFileSync('backend/pytest.log', 'utf8')
              .trim().split('\n').slice(-5).join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `✅ **Backend tests passed**\n\`\`\`\n${tail}\n\`\`\``,
            });

  frontend-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Unit tests
        run: npm run test
      - name: Production build
        run: npm run build
